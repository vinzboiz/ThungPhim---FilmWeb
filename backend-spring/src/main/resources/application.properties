server.port=5000

# MySQL - same env vars as Node backend (DB_*)
spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:thungphim}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP - avoid stale MySQL connections (\"No operations allowed after connection closed\")
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.max-lifetime=300000

# JPA - do not alter schema (DB already from Prisma)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT (same as Node JWT_SECRET)
jwt.secret=mot-chuoi-bi-mat-dai-ngau-nhien
jwt.expiration-ms=604800000

# Upload paths (project root: uploads/)
app.upload.root=../uploads
app.upload.images=${app.upload.root}/images
app.upload.videos=${app.upload.root}/videos

# Multipart + Tomcat - không giới hạn kích thước file phim
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100GB
spring.servlet.multipart.max-request-size=100GB
spring.servlet.multipart.file-size-threshold=0
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=100GB
server.tomcat.connection-timeout=1800000
